<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - MCA E-Consultation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="globalNavbar"></div>
  <main class="container py-3">
    <p class="text-muted mb-3">View topics and submit your comments.</p>
    <div id="globalAlert" class="mb-3"></div>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h5">Submit Comment</h2>
        <div class="row g-3">
          <div class="col-12">
            <label for="topicSelect" class="form-label">Select Topic</label>
            <select id="topicSelect" class="form-select"></select>
            <div class="mt-3">
              <h5 id="selectedTopicTitle" class="mb-1">Select a topic</h5>
              <p id="selectedTopicDescription" class="text-muted mb-2">
                Topic details will appear here.
              </p>
              <a id="selectedTopicDocLink"
                 href="#"
                 target="_blank"
                 rel="noopener noreferrer"
                 class="small d-none">
                 View attached document
              </a>
            </div>
          </div>
          <div class="col-12">
            <label for="commentText" class="form-label">Your Comment</label>
            <textarea id="commentText" class="form-control" rows="4" placeholder="Write your opinion here..."></textarea>
          </div>
          <div class="col-12">
            <button id="submitCommentBtn" class="btn btn-primary">Submit Comment</button>
          </div>
        </div>
        <div id="userStatusMessage" class="small mt-3"></div>
      </div>
    </section>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/router.js"></script>
  <script src="./js/user.js"></script>
</body>
</html>
