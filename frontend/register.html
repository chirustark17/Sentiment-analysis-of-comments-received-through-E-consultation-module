<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MCA E-Consultation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-body">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-9 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-2">Create Account</h1>
            <p class="text-muted mb-4">Register as a citizen or expert.</p>

            <form id="registerForm" novalidate>
              <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <input id="full_name" name="full_name" type="text" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required minlength="6">
              </div>
              <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select id="role" name="role" class="form-select" required>
                  <option value="citizen">Citizen</option>
                  <option value="expert">Expert</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <div id="authMessage" class="small mt-3"></div>
            <hr>
            <p class="mb-0">Already registered? <a href="./login.html">Go to login</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/router.js"></script>
  <script>
    AppAuth.bindRegisterForm();
    AppRouter.guardGuestPage();
  </script>
</body>
</html>
