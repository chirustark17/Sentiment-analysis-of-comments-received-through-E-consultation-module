<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MCA E-Consultation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="auth-body">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-2">Sign In</h1>
            <p class="text-muted mb-4">Use your registered account to continue.</p>

            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div id="authMessage" class="small mt-3"></div>
            <hr>
            <p class="mb-0">New here? <a href="./register.html">Create account</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/router.js"></script>
  <script>
    AppAuth.bindLoginForm();
    AppRouter.guardGuestPage();
  </script>
</body>
</html>
