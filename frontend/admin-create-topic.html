<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Topic - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="globalNavbar"></div>
  <main class="container py-4">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb small mb-0">
        <li class="breadcrumb-item">
          <a href="./admin-control.html">Admin Control Panel</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">
          Create Topic
        </li>
      </ol>
    </nav>
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-7">
        <section class="card shadow-sm admin-topic-card">
          <div class="card-body p-4">
            <h1 class="h4 mb-2 text-center">Create New Consultation Topic</h1>
            <p class="text-muted text-center mb-4">Submit topic details using JSON-only request.</p>

            <div id="topicFormStatusMessage" class="small mb-3"></div>

            <form id="topicCreateForm" novalidate>
              <div class="mb-3">
                <label for="topicTitle" class="form-label">Topic Title</label>
                <input id="topicTitle" name="title" type="text" class="form-control" maxlength="255" required>
              </div>
              <div class="mb-4">
                <label for="topicDescription" class="form-label">Topic Description</label>
                <textarea id="topicDescription" name="description" class="form-control" rows="5" required></textarea>
              </div>
              <div class="d-flex flex-wrap gap-2">
                <button id="submitTopicBtn" type="submit" class="btn btn-primary">Submit</button>
                <button id="cancelTopicBtn" type="button" class="btn btn-outline-secondary">Cancel</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/router.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/adminTopic.js"></script>
</body>
</html>
