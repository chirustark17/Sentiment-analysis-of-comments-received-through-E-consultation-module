<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Control Panel - Sentiment Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div id="globalNavbar"></div>
  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-7 col-xl-6">
        <section class="card shadow-sm admin-control-card">
          <div class="card-body p-4 p-md-5">
            <h1 class="h4 mb-2 text-center">Admin Control Panel</h1>
            <p class="text-muted text-center mb-4">
              Manage consultation topics and open analytics dashboard tools.
            </p>

            <div id="controlStatusMessage" class="small mb-3"></div>

            <div class="d-grid gap-3">
              <button id="openCreateTopicBtn" class="btn btn-primary admin-control-btn">Create New Topic</button>
              <button id="openDashboardBtn" class="btn btn-outline-secondary admin-control-btn">Open Analytics Dashboard</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/router.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (async function initAdminControlPage() {
      const isAllowed = await AppRouter.guardAdminPage();
      if (!isAllowed) {
        return;
      }

      const navbar = document.getElementById('globalNavbar');
      const statusMessage = document.getElementById('controlStatusMessage');
      const createBtn = document.getElementById('openCreateTopicBtn');
      const dashboardBtn = document.getElementById('openDashboardBtn');

      AppUi.renderNavbar(navbar, 'Admin Control Panel');
      AppUi.showAlert(statusMessage, 'Select an action to continue.', 'info');

      createBtn.addEventListener('click', () => {
        window.location.href = './admin-create-topic.html';
      });

      dashboardBtn.addEventListener('click', () => {
        window.location.href = './admin.html';
      });
    })();
  </script>
</body>
</html>
